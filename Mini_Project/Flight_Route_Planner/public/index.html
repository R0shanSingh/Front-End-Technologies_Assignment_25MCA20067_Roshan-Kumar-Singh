<!DOCTYPE html>
<html>
<head>
<title>Flight Route Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: black;
}
.container-box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}
.section-title {
    font-weight: bold;
    margin-bottom: 10px;
}
</style>
</head>

<body class="container mt-5">

<div class="container-box">

<h2 class="text-center mb-4">✈ Flight Route Planner</h2>

<div class="row">

<div class="col-md-5">

<div class="section-title">Add Flight</div>

<input id="source" class="form-control mb-2" placeholder="Source">
<input id="destination" class="form-control mb-2" placeholder="Destination">
<input id="cost" type="number" class="form-control mb-2" placeholder="Cost">

<button onclick="addFlight()" class="btn btn-primary w-100 mb-3">
    Add Flight
</button>

<hr>

<div class="section-title">Find Route</div>

<input id="src" class="form-control mb-2" placeholder="From">
<input id="dest" class="form-control mb-2" placeholder="To">

<button onclick="findPath()" class="btn btn-success w-100">
    Find Shortest Path
</button>

</div>


<div class="col-md-7">

<div class="section-title">Results</div>

<div class="alert alert-info">
    <p id="costResult">Cost: -</p>
    <p id="pathResult">Path: -</p>
</div>

<hr>

<div class="section-title">All Flights</div>

<ul id="list" class="list-group"></ul>

</div>

</div>
</div>

<script>

// LOAD FLIGHTS
async function load(){
 let res = await fetch("/api/flights");
 let data = await res.json();

 list.innerHTML = data.map(f =>
   `<li class="list-group-item">
     ${f.source} → ${f.destination}
     <span class="float-end">₹${f.cost}</span>
   </li>`
 ).join("");
}
load();

// ADD FLIGHT
async function addFlight(){
 await fetch("/api/flights",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    source:source.value,
    destination:destination.value,
    cost:Number(cost.value)
  })
 });
 load();
}

// FIND PATH
async function findPath(){
 let res = await fetch(`/api/flights/shortest/${src.value}/${dest.value}`);
 let data = await res.json();

 costResult.innerText = "Cost: ₹" + data.cost;
 pathResult.innerText = "Path: " + data.path.join(" → ");
}

</script>

</body>
</html>

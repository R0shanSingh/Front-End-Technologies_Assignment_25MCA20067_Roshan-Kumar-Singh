<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart To-Do Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-4">

        <h1 class="text-center mb-4">Smart To-Do Manager</h1>

        <div class="card p-3 mb-4">
            <h4>Input Task</h4>
            <form id="taskForm">
            <div class="row g-3">
                <div class="col-md-4">
                <input type="text" id="taskName" class="form-control" placeholder="Task Name" required>
                </div>
                <div class="col-md-3">
                <select id="priority" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Med">Medium</option>
                    <option value="High">High</option>
                </select>
                </div>
                <div class="col-md-3">
                <input type="date" id="deadline" class="form-control" required>
                </div>
                <div class="col-md-2">
                <button class="btn btn-primary w-100">Add</button>
                </div>
            </div>
            </form>
        </div>


        <div id="taskList" class="row g-3"></div>
    

        <div class="d-flex justify-content-between mb-3 flex-wrap gap-2">
            <div>
            <button class="btn btn-secondary filter" data-filter="all">All</button>
            <button class="btn btn-success filter" data-filter="completed">Completed</button>
            <button class="btn btn-warning filter" data-filter="pending">Pending</button>
            </div>

            <div >
                <select id="sort" class="form-select bg-primary text-white">
                    <option value="">Sort By</option>
                    <option value="priority">Priority(High to Low)</option>
                    <option value="deadline">Deadline(Nearest)</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <h5>Total: <span id="total">0</span></h5>
            <h5>Completed: <span id="completed">0</span></h5>
            <h5>Pending: <span id="pending">0</span></h5>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>
</html>
